<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeGifted — Package Expiry Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F7F5F0;--surface:#FFF;--surface2:#F0EDE6;--orange:#FE7622;--orange-dark:#D95F0A;
    --blue:#0145A8;--blue-light:#E8EFFC;--red:#C0392B;--red-light:#FDECEB;
    --yellow:#D4870A;--yellow-light:#FEF9EC;--green:#1A7A4A;--green-light:#E8F5EE;
    --gray:#6B7280;--gray-light:#F3F4F6;--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.14);
    --text:#1A1A2E;--text-2:#4A4A6A;--text-3:#8A8AAA;
    --radius:12px;--radius-sm:8px;
    --shadow:0 1px 3px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
  .topbar{background:var(--blue);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .brand-dot{width:28px;height:28px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white}
  .brand-name{font-weight:700;font-size:15px;color:white;letter-spacing:-0.02em}
  .brand-sub{font-size:11px;color:rgba(255,255,255,0.6);margin-top:1px}
  .today-badge{font-size:12px;color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.12);padding:4px 10px;border-radius:20px}
  .layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 56px)}
  .left-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .panel-header{padding:16px 18px 12px;border-bottom:1px solid var(--border)}
  .panel-title{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .summary-pills{display:flex;gap:6px;flex-wrap:wrap}
  .s-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
  .s-pill.active{border-color:currentColor}
  .s-pill.all{background:var(--blue-light);color:var(--blue)}
  .s-pill.notify{background:var(--red-light);color:var(--red)}
  .s-pill.watch{background:var(--yellow-light);color:var(--yellow)}
  .s-pill.ok{background:var(--green-light);color:var(--green)}
  .search-wrap{padding:10px 18px;border-bottom:1px solid var(--border)}
  .search-input{width:100%;padding:7px 10px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none}
  .search-input:focus{border-color:var(--blue)}
  .student-list{overflow-y:auto;flex:1}
  .student-item{padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:12px}
  .student-item:hover{background:var(--gray-light)}
  .student-item.active{background:var(--blue-light)}
  .student-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
  .student-info{flex:1;min-width:0}
  .student-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .student-sub{font-size:11px;color:var(--text-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .right-panel{overflow-y:auto;padding:24px 28px;background:var(--bg)}
  .overview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .metric-label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .metric-value{font-size:28px;font-weight:700;letter-spacing:-0.03em;line-height:1}
  .metric-value.red{color:var(--red)}.metric-value.yellow{color:var(--yellow)}.metric-value.green{color:var(--green)}.metric-value.blue{color:var(--blue)}
  .metric-sub{font-size:11px;color:var(--text-3);margin-top:4px}
  .section-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .section-head h2{font-size:15px;font-weight:700}
  .section-badge{background:var(--orange);color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
  .alert-table{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow);margin-bottom:24px;width:100%}
  .alert-table table{width:100%;border-collapse:collapse}
  .alert-table th{padding:10px 14px;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;text-align:left;background:var(--surface2);border-bottom:1px solid var(--border)}
  .alert-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
  .alert-table tr:last-child td{border-bottom:none}
  .alert-table tr:hover td{background:var(--gray-light);cursor:pointer}
  .status-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
  .status-chip.notify{background:var(--red-light);color:var(--red)}
  .status-chip.watch{background:var(--yellow-light);color:var(--yellow)}
  .status-chip.ok{background:var(--green-light);color:var(--green)}
  .status-chip.nodata{background:var(--gray-light);color:var(--gray)}
  .detail-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow)}
  .detail-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
  .detail-name{font-size:18px;font-weight:700;letter-spacing:-0.02em}
  .detail-parent{font-size:13px;color:var(--text-2);margin-top:4px}
  .detail-meta{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
  .detail-tag{font-size:11px;background:var(--blue-light);color:var(--blue);padding:2px 8px;border-radius:20px;font-weight:500}
  .packages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:24px}
  .pkg-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .pkg-card-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
  .pkg-name{font-weight:700;font-size:13px}
  .pkg-card-body{padding:14px 16px}
  .credit-bar-wrap{margin-bottom:12px}
  .credit-bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-bottom:5px}
  .credit-bar-track{height:6px;background:var(--gray-light);border-radius:3px;overflow:hidden}
  .credit-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
  .alert-info-box{border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:10px;font-size:12px}
  .alert-info-box.notify{background:var(--red-light);border-left:3px solid var(--red);border-radius:0}
  .alert-info-box.watch{background:var(--yellow-light);border-left:3px solid var(--yellow);border-radius:0}
  .alert-info-box.nodata{background:var(--gray-light);border-left:3px solid var(--text-3);border-radius:0}
  .alert-info-row{display:flex;justify-content:space-between;margin-top:4px}
  .alert-info-row span:first-child{color:var(--text-3)}
  .alert-info-row span:last-child{font-weight:600}
  .calendar-section{margin-top:20px}
  .cal-title{font-size:13px;font-weight:700;margin-bottom:12px}
  .cal-months-container{overflow-x:auto}
  .cal-months{display:flex;gap:16px;min-width:max-content;padding-bottom:8px}
  .cal-month{min-width:200px}
  .cal-month-name{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-dow{font-size:9px;color:var(--text-3);font-weight:600;text-align:center;padding:2px 0;text-transform:uppercase}
  .cal-day{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--text-3);cursor:default}
  .cal-day.session{font-weight:700;cursor:pointer;transition:transform .1s}
  .cal-day.session:hover{transform:scale(1.15)}
  .cal-day.session.ok{background:var(--green-light);color:var(--green)}
  .cal-day.session.watch{background:var(--yellow-light);color:var(--yellow)}
  .cal-day.session.alert{background:var(--red-light);color:var(--red)}
  .cal-day.session.exhaust{background:var(--red);color:white}
  .cal-day.today-mark{border:1.5px solid var(--blue)}
  .cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .cal-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-3)}
  .cal-leg-dot{width:10px;height:10px;border-radius:50%}
  .tooltip{position:fixed;background:var(--text);color:white;padding:6px 10px;border-radius:var(--radius-sm);font-size:11px;font-family:'DM Mono',monospace;pointer-events:none;z-index:9999;white-space:nowrap;opacity:0;transition:opacity .1s}
  .timeline-wrap{margin-top:14px}
  .timeline-title{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .timeline-row{display:grid;grid-template-columns:70px 40px 50px 1fr;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
  .timeline-row.header{color:var(--text-3);font-weight:600}
  .timeline-row.alert-row{background:rgba(192,57,43,.04)}
  .timeline-row.exhaust-row{background:rgba(192,57,43,.08)}
  .tl-date{font-family:'DM Mono',monospace;color:var(--text-2)}
  .tl-dur{color:var(--text-3);text-align:right}
  .tl-deduct{color:var(--red);font-weight:600;text-align:right}
  .back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--blue);cursor:pointer;margin-bottom:18px;padding:5px 10px;border-radius:var(--radius-sm);background:var(--blue-light);border:none;font-family:inherit}
  .send-msg-btn{display:flex;align-items:center;gap:6px;width:100%;margin-top:10px;padding:8px 12px;background:var(--orange);color:white;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
  .send-msg-btn:hover{background:var(--orange-dark)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:white;border-radius:var(--radius);padding:24px;width:460px;max-width:95vw;box-shadow:0 4px 24px rgba(0,0,0,.10)}
  .modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
  .modal-msg{background:var(--bg);border-radius:var(--radius-sm);padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;border:1px solid var(--border);margin-bottom:14px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end}
  .modal-btn{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;background:white}
  .modal-btn.primary{background:var(--orange);color:white;border-color:var(--orange)}
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="brand-dot">BG</div>
    <div><div class="brand-name">BeGifted Education</div><div class="brand-sub">Package Expiry Dashboard</div></div>
  </div>
  <span class="today-badge" id="today-label"></span>
</div>

<div class="layout">
  <div class="left-panel">
    <div class="panel-header">
      <div class="panel-title">Students</div>
      <div class="summary-pills">
        <div class="s-pill all active" onclick="setFilter('all')">All <span id="cnt-all">0</span></div>
        <div class="s-pill notify" onclick="setFilter('notify')">Notify <span id="cnt-notify">0</span></div>
        <div class="s-pill watch" onclick="setFilter('watch')">Watch <span id="cnt-watch">0</span></div>
        <div class="s-pill ok" onclick="setFilter('ok')">OK <span id="cnt-ok">0</span></div>
      </div>
    </div>
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="Search nickname, name or parent..." oninput="handleSearch(this.value)">
    </div>
    <div class="student-list" id="student-list"></div>
  </div>
  <div class="right-panel" id="right-panel"></div>
</div>

<div class="tooltip" id="tooltip"></div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>แจ้งผู้ปกครองทาง LINE</h3>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal()">ปิด</button>
      <button class="modal-btn primary" onclick="copyMsg()">Copy Message</button>
    </div>
  </div>
</div>

<script>
const TODAY = new Date();
TODAY.setHours(0,0,0,0);

const DATA = JSON.parse(<?= JSON.stringify(getStudentData()) ?>);

// ── NAME HELPERS ─────────────────────────────────────────────────────
function getNickname(name) {
  var m = name.match(/\(([^)]+)\)/);
  return m ? m[1] : name.split(' ')[0];
}
function getFullName(name) {
  var out = '', inBracket = false;
  for (var i = 0; i < name.length; i++) {
    if (name[i] === '(') { inBracket = true; continue; }
    if (name[i] === ')') { inBracket = false; continue; }
    if (!inBracket) out += name[i];
  }
  return out.replace(/\s+/g, ' ').trim();
}
function getInitials(name) {
  return name.split(' ').filter(function(n){ return n && n[0] !== '('; })
    .slice(0,2).map(function(n){ return n[0]; }).join('').toUpperCase();
}

// ── UTILS ────────────────────────────────────────────────────────────
function avatarColor(i) {
  var p=[{bg:'#E8EFFC',fg:'#0145A8'},{bg:'#FFF0E6',fg:'#D95F0A'},{bg:'#E8F5EE',fg:'#1A7A4A'},{bg:'#FFF9EC',fg:'#C87D0A'},{bg:'#F3EEFF',fg:'#6B2FD9'}];
  return p[i%p.length];
}
function worstStatus(pkgs) {
  if (pkgs.some(function(p){return p.status==='notify';})) return 'notify';
  if (pkgs.some(function(p){return p.status==='watch';}))  return 'watch';
  if (pkgs.some(function(p){return p.status==='ok';}))     return 'ok';
  return 'nodata';
}
function statusLabel(s) { return {notify:'Notify Now',watch:'Watch',ok:'OK',nodata:'No Data'}[s]||s; }
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function computeCounts() {
  var n=0,w=0,o=0;
  DATA.forEach(function(s){
    var st=worstStatus(s.packages);
    if(st==='notify')n++; else if(st==='watch')w++; else if(st==='ok')o++;
  });
  return {total:DATA.length,notify:n,watch:w,ok:o};
}

// ── STATE ────────────────────────────────────────────────────────────
var currentFilter='all', currentSearch='', selectedStudent=null;
var _notifyPkgs=[], _sortCol='days', _sortAsc=true;

// ── STUDENT LIST ─────────────────────────────────────────────────────
function renderList() {
  var list = document.getElementById('student-list');
  var filtered = DATA.filter(function(s) {
    var st = worstStatus(s.packages);
    var matchFilter = currentFilter==='all' || st===currentFilter;
    var q = currentSearch;
    var matchSearch = !q ||
      s.student.toLowerCase().indexOf(q)>=0 ||
      s.parent.toLowerCase().indexOf(q)>=0 ||
      getNickname(s.student).toLowerCase().indexOf(q)>=0 ||
      getFullName(s.student).toLowerCase().indexOf(q)>=0;
    return matchFilter && matchSearch;
  });
  if (!filtered.length) {
    list.innerHTML='<div style="padding:24px;text-align:center;color:var(--text-3);font-size:13px">No students found</div>';
    return;
  }
  list.innerHTML = filtered.map(function(s) {
    var ri=DATA.indexOf(s), st=worstStatus(s.packages), pal=avatarColor(ri);
    var isActive = selectedStudent && selectedStudent.student===s.student;
    return '<div class="student-item'+(isActive?' active':'')+'" onclick="selectStudent('+ri+')">'
      +'<div class="student-avatar" style="background:'+pal.bg+';color:'+pal.fg+'">'+getInitials(s.student)+'</div>'
      +'<div class="student-info">'
        +'<div class="student-name">'+getNickname(s.student)+'</div>'
        +'<div class="student-sub">'+getFullName(s.student)+' · '+s.parent.split(' ')[0]+'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
        +'<span class="status-chip '+st+'" style="font-size:10px;padding:2px 7px">'+statusLabel(st)+'</span>'
        +'<span style="font-size:10px;color:var(--text-3)">'+s.packages.length+' pkg'+(s.packages.length>1?'s':'')+'</span>'
      +'</div>'
    +'</div>';
  }).join('');
}

// ── SORT TABLE ───────────────────────────────────────────────────────
function sortNotify(col) {
  if (_sortCol===col) { _sortAsc=!_sortAsc; } else { _sortCol=col; _sortAsc=true; }
  renderNotifyTable();
}
function renderNotifyTable() {
  var tbody=document.getElementById('notify-tbody');
  if(!tbody) return;
  ['student','parent','package','credits','exhausted','days'].forEach(function(c){
    var el=document.getElementById('sort-'+c);
    if(el) el.textContent=_sortCol===c?(_sortAsc?'▲':'▼'):'';
  });
  var sorted=_notifyPkgs.slice().sort(function(a,b){
    var av,bv;
    if(_sortCol==='student'){av=a.student.student;bv=b.student.student;}
    else if(_sortCol==='parent'){av=a.student.parent;bv=b.student.parent;}
    else if(_sortCol==='package'){av=a.pkg.name;bv=b.pkg.name;}
    else if(_sortCol==='credits'){av=a.pkg.adjustedRemaining;bv=b.pkg.adjustedRemaining;}
    else if(_sortCol==='exhausted'){av=a.pkg.exhaustDate||'';bv=b.pkg.exhaustDate||'';}
    else{av=a.pkg.daysUntilAlert||999;bv=b.pkg.daysUntilAlert||999;}
    if(typeof av==='number') return _sortAsc?av-bv:bv-av;
    return _sortAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
  });
  tbody.innerHTML=sorted.map(function(x){
    var s=x.student,p=x.pkg;
    return '<tr onclick="selectStudent('+DATA.indexOf(s)+')">'
      +'<td><b>'+getNickname(s.student)+'</b><div style="font-size:10px;color:var(--text-3)">'+getFullName(s.student)+'</div></td>'
      +'<td style="color:var(--text-3)">'+s.parent+'</td>'
      +'<td style="font-size:12px">'+p.name+'</td>'
      +'<td><b style="color:var(--red)">'+p.adjustedRemaining+'</b></td>'
      +'<td style="font-family:\'DM Mono\',monospace;font-size:12px">'+fmtDate(p.exhaustDate)+'</td>'
      +'<td><span style="font-weight:700;color:'+(p.daysUntilAlert<=7?'var(--red)':'var(--yellow)')+'">'+p.daysUntilAlert+' days</span></td>'
      +'<td><span class="status-chip notify">Notify Now</span></td>'
      +'<td data-si="'+DATA.indexOf(s)+'" data-bal="'+p.adjustedRemaining+'" data-end="'+(p.exhaustDate||'')+'" onclick="event.stopPropagation();var t=this;notifyLine(t.dataset.si,t.dataset.bal,t.dataset.end)" style="color:var(--orange);font-weight:700;font-size:11px;cursor:pointer;white-space:nowrap">LINE ↗</td>'
    +'</tr>';
  }).join('');
}

// ── OVERVIEW ─────────────────────────────────────────────────────────
function renderOverview() {
  var counts=computeCounts();
  var right=document.getElementById('right-panel');
  _notifyPkgs=[];
  DATA.forEach(function(s){ s.packages.filter(function(p){return p.status==='notify';}).forEach(function(p){_notifyPkgs.push({student:s,pkg:p});}); });
  var watchStudents=DATA.filter(function(s){return worstStatus(s.packages)==='watch';});

  var notifyTable = _notifyPkgs.length
    ? '<div class="section-head"><h2>Packages requiring action</h2><span class="section-badge">'+_notifyPkgs.length+' packages</span></div>'
      +'<div class="alert-table"><table>'
      +'<thead><tr>'
        +'<th onclick="sortNotify(\'student\')" style="cursor:pointer;user-select:none">Student <span id="sort-student"></span></th>'
        +'<th onclick="sortNotify(\'parent\')" style="cursor:pointer;user-select:none">Parent <span id="sort-parent"></span></th>'
        +'<th onclick="sortNotify(\'package\')" style="cursor:pointer;user-select:none">Package <span id="sort-package"></span></th>'
        +'<th onclick="sortNotify(\'credits\')" style="cursor:pointer;user-select:none">Actual Credits <span id="sort-credits"></span></th>'
        +'<th onclick="sortNotify(\'exhausted\')" style="cursor:pointer;user-select:none">Exhausted <span id="sort-exhausted"></span></th>'
        +'<th onclick="sortNotify(\'days\')" style="cursor:pointer;user-select:none">Days Left <span id="sort-days">▲</span></th>'
        +'<th>Status</th><th></th>'
      +'</tr></thead>'
      +'<tbody id="notify-tbody"></tbody>'
      +'</table></div>'
    : '<div style="padding:20px;text-align:center;color:var(--text-3)">No packages require immediate action.</div>';

  var watchTable = '';
  if (watchStudents.length) {
    var wRows = watchStudents.map(function(s){
      return s.packages.filter(function(p){return p.status==='watch';}).map(function(p){
        return '<tr onclick="selectStudent('+DATA.indexOf(s)+')">'
          +'<td><b>'+getNickname(s.student)+'</b><div style="font-size:10px;color:var(--text-3)">'+getFullName(s.student)+'</div></td>'
          +'<td style="font-size:12px">'+p.name+'</td>'
          +'<td>'+p.adjustedRemaining+'</td>'
          +'<td style="font-family:\'DM Mono\',monospace;font-size:12px">'+fmtDate(p.alertDate)+'</td>'
          +'<td><span style="font-weight:700;color:var(--yellow)">'+p.daysUntilAlert+' days</span></td>'
          +'<td><span class="status-chip watch">Watch</span></td>'
        +'</tr>';
      }).join('');
    }).join('');
    var wCount = watchStudents.reduce(function(a,s){return a+s.packages.filter(function(p){return p.status==='watch';}).length;},0);
    watchTable = '<div class="section-head" style="margin-top:8px"><h2>Watch list</h2><span class="section-badge" style="background:var(--yellow)">'+wCount+' packages</span></div>'
      +'<div class="alert-table"><table>'
      +'<thead><tr><th>Student</th><th>Package</th><th>Actual Credits</th><th>Balance &lt; 2 on</th><th>Days Left</th><th>Status</th></tr></thead>'
      +'<tbody>'+wRows+'</tbody></table></div>';
  }

  right.innerHTML =
    '<div class="overview-grid">'
      +'<div class="metric-card"><div class="metric-label">Total Students</div><div class="metric-value blue">'+counts.total+'</div><div class="metric-sub">active in system</div></div>'
      +'<div class="metric-card"><div class="metric-label">Notify Now</div><div class="metric-value red">'+counts.notify+'</div><div class="metric-sub">credit &lt; 2 now</div></div>'
      +'<div class="metric-card"><div class="metric-label">Watch</div><div class="metric-value yellow">'+counts.watch+'</div><div class="metric-sub">within 30 days</div></div>'
      +'<div class="metric-card"><div class="metric-label">OK / No Data</div><div class="metric-value green">'+(counts.ok+(counts.total-counts.notify-counts.watch-counts.ok))+'</div><div class="metric-sub">no action needed</div></div>'
    +'</div>'
    + notifyTable + watchTable;

  setTimeout(function(){ renderNotifyTable(); }, 0);
}

// ── STUDENT DETAIL ───────────────────────────────────────────────────
function renderDetail(s) {
  var right=document.getElementById('right-panel');
  var si=DATA.indexOf(s), pal=avatarColor(si);
  var pkgCards=s.packages.map(function(p){return renderPackageCard(p,s);}).join('');
  right.innerHTML =
    '<button class="back-btn" onclick="goOverview()">← Back to overview</button>'
    +'<div class="detail-header">'
      +'<div class="detail-avatar" style="background:'+pal.bg+';color:'+pal.fg+'">'+getInitials(s.student)+'</div>'
      +'<div>'
        +'<div class="detail-name">'+getNickname(s.student)+'</div>'
        +'<div style="font-size:12px;color:var(--text-3);margin-top:2px">'+getFullName(s.student)+'</div>'
        +'<div class="detail-parent">Parent: '+s.parent+'</div>'
        +'<div class="detail-meta">'+s.packages.map(function(p){return '<span class="detail-tag">'+p.name+'</span>';}).join('')+'</div>'
      +'</div>'
      +'<div style="margin-left:auto;text-align:right">'
        +'<div style="font-size:11px;color:var(--text-3);margin-bottom:4px">Overall status</div>'
        +'<span class="status-chip '+worstStatus(s.packages)+'" style="font-size:13px;padding:5px 12px">'+statusLabel(worstStatus(s.packages))+'</span>'
      +'</div>'
    +'</div>'
    +'<div class="packages-grid">'+pkgCards+'</div>'
    +renderCalendar(s);
}

function renderPackageCard(p, s) {
  var pct=p.totalCredits>0?p.adjustedRemaining/p.totalCredits:0;
  var barCol=pct>0.4?'#1A7A4A':pct>0.2?'#D4870A':'#C0392B';
  var adjCol=p.adjustedRemaining<2?'var(--red)':p.adjustedRemaining<4?'var(--yellow)':'var(--green)';
  var safeStudent=s.student.replace(/'/g,"\\'"), safeParent=s.parent.replace(/'/g,"\\'"), safePkg=p.name.replace(/'/g,"\\'");

  var creditBreakdown = p.pendingDeduction>0
    ? '<div style="margin-top:10px;padding:10px 12px;background:var(--gray-light);border-radius:var(--radius-sm);font-size:12px;line-height:2">'
        +'<div style="display:flex;justify-content:space-between;color:var(--text-3)"><span>System shows</span><span>'+p.currentRemaining+' credits</span></div>'
        +'<div style="display:flex;justify-content:space-between;color:var(--yellow)"><span>Pending deduct (teacher feedback pending)</span><span>−'+p.pendingDeduction+'</span></div>'
        +'<div style="border-top:1px solid var(--border);margin-top:4px;padding-top:4px;display:flex;justify-content:space-between;font-weight:700"><span>Actual remaining</span><span style="color:'+adjCol+'">'+p.adjustedRemaining+' credits</span></div>'
      +'</div>'
    : '<div style="margin-top:8px;font-size:13px;color:var(--text-2)">Actual remaining: <b style="color:'+adjCol+'">'+p.adjustedRemaining+' credits</b></div>';

  var alertBox = p.status!=='nodata'
    ? '<div class="alert-info-box '+p.status+'" style="margin-top:10px">'
        +(p.alertDate?'<div class="alert-info-row"><span>Balance &lt; 2 on</span><span>'+fmtDate(p.alertDate)+'</span></div><div class="alert-info-row"><span>Days until alert</span><span>'+p.daysUntilAlert+' days</span></div>':'')
        +(p.exhaustDate?'<div class="alert-info-row"><span>Package exhausted</span><span>'+fmtDate(p.exhaustDate)+'</span></div>':'')
      +'</div>'
    : '<div class="alert-info-box nodata" style="margin-top:10px"><div style="color:var(--text-3);font-size:12px">ไม่มี upcoming sessions ที่วางแผนไว้</div></div>';

  var timeline = '';
  if (p.projection.length) {
    var rows=p.projection.map(function(r){
      var rowCls=r.flag==='alert'?'alert-row':r.flag==='exhaust'?'exhaust-row':'';
      var balCls=r.bal<2?'red':r.bal<4?'yellow':'green';
      var bar = r.bal>=0
        ? '<div style="height:5px;background:var(--gray-light);border-radius:3px;overflow:hidden;margin-bottom:3px"><div style="height:100%;width:'+Math.max(0,Math.min(100,r.bal/p.totalCredits*100)).toFixed(1)+'%;background:'+(r.bal>=4?'#1A7A4A':r.bal>=2?'#D4870A':'#C0392B')+';border-radius:3px"></div></div><div style="text-align:right;font-family:\'DM Mono\',monospace;font-size:11px;font-weight:600;color:var(--'+balCls+')">'+r.bal.toFixed(1)+'</div>'
        : '<div style="text-align:right;font-family:\'DM Mono\',monospace;font-size:12px;font-weight:700;color:var(--red)">'+r.bal.toFixed(1)+'</div>';
      return '<div class="timeline-row '+rowCls+'">'
        +'<span class="tl-date">'+new Date(r.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})+'</span>'
        +'<span class="tl-dur">'+r.dur+'m</span>'
        +'<span class="tl-deduct">−'+r.deduct+'</span>'
        +'<div>'+bar+'</div>'
      +'</div>';
    }).join('');
    timeline='<div class="timeline-wrap">'
      +'<div class="timeline-title">Credit projection</div>'
      +'<div class="timeline-row header" style="border-bottom:1.5px solid var(--border-strong);padding-bottom:5px;margin-bottom:2px"><span>Date</span><span style="text-align:right">Min</span><span style="text-align:right">−Cr.</span><span style="text-align:right">Balance</span></div>'
      +rows+'</div>';
  }

  var lineBtn = (p.status==='notify'||p.status==='watch')
    ? '<button class="send-msg-btn" onclick="openMsgModal(\''+safeStudent+'\',\''+safeParent+'\',\''+safePkg+'\','+p.adjustedRemaining+',\''+(p.exhaustDate||p.alertDate||'')+'\')">Send LINE Message to Parent ↗</button>'
    : '';

  return '<div class="pkg-card">'
    +'<div class="pkg-card-header">'
      +'<div><div class="pkg-name">'+p.name+'</div><div style="font-size:11px;color:var(--text-3);margin-top:4px">Total: <b style="color:var(--text);font-size:13px">'+p.totalCredits+'</b> credits</div></div>'
      +'<span class="status-chip '+p.status+'">'+statusLabel(p.status)+'</span>'
    +'</div>'
    +'<div class="pkg-card-body">'
      +creditBreakdown
      +'<div class="credit-bar-wrap" style="margin-top:12px">'
        +'<div class="credit-bar-label"><span>0</span><span style="color:'+barCol+';font-weight:600">'+(pct*100).toFixed(0)+'% remaining</span><span>'+p.totalCredits+'</span></div>'
        +'<div class="credit-bar-track"><div class="credit-bar-fill" style="width:'+(pct*100).toFixed(1)+'%;background:'+barCol+'"></div></div>'
      +'</div>'
      +alertBox+timeline+lineBtn
    +'</div>'
  +'</div>';
}

// ── CALENDAR ─────────────────────────────────────────────────────────
function renderCalendar(s) {
  var sessionMap={};
  s.packages.forEach(function(p){
    p.projection.forEach(function(r){
      if(!sessionMap[r.date]) sessionMap[r.date]=[];
      sessionMap[r.date].push({pkg:p.name,flag:r.flag,bal:r.bal,deduct:r.deduct});
    });
  });
  if(!Object.keys(sessionMap).length) return '';
  var dates=Object.keys(sessionMap).map(function(d){return new Date(d);});
  var minDate=new Date(Math.min.apply(null,[TODAY].concat(dates)));
  var maxDate=new Date(Math.max.apply(null,dates));
  maxDate.setMonth(maxDate.getMonth()+1);
  var monthsHtml='', cur=new Date(minDate.getFullYear(),minDate.getMonth(),1);
  while(cur<=maxDate){monthsHtml+=renderCalMonth(cur,sessionMap);cur.setMonth(cur.getMonth()+1);}

  var pkgSummary=s.packages.map(function(p){
    var adj=p.adjustedRemaining,dotColor,statusText;
    if(adj<=0){dotColor='var(--red)';statusText='No credits remaining';}
    else if(adj<2){dotColor='var(--red)';statusText=adj+' credit left — critically low';}
    else if(adj<4){dotColor='var(--yellow)';statusText=adj+' credits remaining';}
    else{dotColor='var(--green)';statusText=adj+' credits remaining';}
    var exhaustTxt=p.exhaustDate?' · exhausted '+fmtDate(p.exhaustDate):(p.alertDate?' · drops below 2 on '+fmtDate(p.alertDate):'');
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm)">'
      +'<div style="width:10px;height:10px;border-radius:50%;background:'+dotColor+';flex-shrink:0"></div>'
      +'<div style="flex:1"><div style="font-size:12px;font-weight:600">'+p.name+'</div><div style="font-size:11px;color:var(--text-3)">'+statusText+exhaustTxt+'</div></div>'
      +'<span class="status-chip '+p.status+'" style="font-size:10px;padding:2px 8px">'+statusLabel(p.status)+'</span>'
    +'</div>';
  }).join('');

  return '<div class="calendar-section">'
    +'<div class="cal-title">Session calendar — credit projection</div>'
    +'<div class="cal-months-container"><div class="cal-months">'+monthsHtml+'</div></div>'
    +'<div class="cal-legend">'
      +'<div class="cal-leg"><div class="cal-leg-dot" style="background:var(--green-light);border:1.5px solid var(--green)"></div> Credit ≥ 4</div>'
      +'<div class="cal-leg"><div class="cal-leg-dot" style="background:var(--yellow-light);border:1.5px solid var(--yellow)"></div> Credit 2–4</div>'
      +'<div class="cal-leg"><div class="cal-leg-dot" style="background:var(--red-light);border:1.5px solid var(--red)"></div> Below 2</div>'
      +'<div class="cal-leg"><div class="cal-leg-dot" style="background:var(--red)"></div> Exhausted</div>'
    +'</div>'
    +'<div style="margin-top:16px"><div style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">Package summary</div>'
    +'<div style="display:flex;flex-direction:column;gap:6px">'+pkgSummary+'</div></div>'
  +'</div>';
}

function renderCalMonth(monthDate, sessionMap) {
  var mn=monthDate.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  var year=monthDate.getFullYear(), month=monthDate.getMonth();
  var dim=new Date(year,month+1,0).getDate(), fdow=new Date(year,month,1).getDay();
  var dows=['Su','Mo','Tu','We','Th','Fr','Sa'];
  var cells=dows.map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('');
  for(var i=0;i<fdow;i++) cells+='<div class="cal-day empty"></div>';
  var todayStr=TODAY.toISOString().slice(0,10);
  for(var d=1;d<=dim;d++){
    var ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isTd=ds===todayStr, sess=sessionMap[ds];
    if(sess){
      var wf=sess.some(function(x){return x.flag==='exhaust';})?'exhaust':sess.some(function(x){return x.flag==='alert';})?'alert':sess.some(function(x){return x.bal<4;})?'watch':'ok';
      var tip=sess.map(function(x){return x.pkg+': -'+x.deduct+'cr -> '+x.bal.toFixed(1);}).join(' | ');
      cells+='<div class="cal-day session '+wf+(isTd?' today-mark':'')+'" onmouseenter="showTip(event,\''+ds+'\\n'+tip.replace(/'/g,"\\'")+'\''+')" onmouseleave="hideTip()">'+d+'</div>';
    } else {
      cells+='<div class="cal-day'+(isTd?' today-mark':'')+'"><span style="color:var(--text-3)">'+d+'</span></div>';
    }
  }
  return '<div class="cal-month"><div class="cal-month-name">'+mn+'</div><div class="cal-grid">'+cells+'</div></div>';
}

// ── MODAL ────────────────────────────────────────────────────────────
function notifyLine(si, bal, endDate) {
  var s = DATA[parseInt(si)];
  // find the notify pkg - pick first notify package
  var pkg = s.packages.filter(function(p){return p.status==='notify';})[0];
  if (!pkg) pkg = s.packages[0];
  openMsgModal(s.student, s.parent, pkg.name, parseFloat(bal), endDate);
}
function openMsgModal(student, parent, pkg, bal, endDate) {
  var firstName=getNickname(student), parentFirst=parent.split(' ')[0];
  var month=endDate?new Date(endDate).toLocaleDateString('th-TH',{month:'long',year:'numeric'}):'เร็วๆ นี้';
  var creditLine, actionLine;
  if(bal<=0){
    creditLine='ตอนนี้ package "'+pkg+'" ของน้อง'+firstName+' ใช้เครดิตหมดแล้วค่ะ 🙏';
    actionLine='รบกวนติดต่อกลับเพื่อต่อ package ให้น้องได้เลยนะคะ ทางทีมงานพร้อมดูแลและแนะนำแพ็คเกจที่เหมาะสมให้น้องค่ะ เพื่อให้การเรียนของน้องต่อเนื่องไม่สะดุดค่ะ 💛';
  } else if(bal<2){
    creditLine='ตอนนี้ package "'+pkg+'" ของน้อง'+firstName+' เหลือเครดิตอีกเพียง '+bal+' credit เท่านั้นแล้วค่ะ ใกล้หมดมากๆ เลยค่ะ 🙏';
    actionLine='รบกวนติดต่อกลับเพื่อวางแผนต่อ package ล่วงหน้าได้เลยนะคะ ทางทีมงานพร้อมช่วยดูแลให้น้องเรียนต่อเนื่องได้อย่างราบรื่นค่ะ 💛';
  } else {
    creditLine='ตอนนี้ package "'+pkg+'" ของน้อง'+firstName+' เหลือเครดิตอีกประมาณ '+bal+' credits แล้วค่ะ คาดว่าจะหมดในช่วง'+month+'นี้ค่ะ 🙏';
    actionLine='รบกวนติดต่อกลับเพื่อวางแผนต่อ package ล่วงหน้าได้เลยนะคะ เพื่อให้น้องได้เรียนต่อเนื่องโดยไม่มีสะดุดค่ะ 💛';
  }
  var msg='สวัสดีค่ะคุณ'+parentFirst+' 😊\n\nทีมงาน BeGifted ขอรบกวนแจ้งให้ทราบเรื่อง package การเรียนของน้อง'+firstName+' นะคะ\n\n'+creditLine+'\n\n'+actionLine+'\n\nหากมีข้อสงสัยหรืออยากสอบถามเพิ่มเติม ติดต่อทีมงานได้เลยนะคะ ยินดีให้คำแนะนำทุกเรื่องเลยค่ะ 🤍';
  document.getElementById('modal-msg').textContent=msg;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function copyMsg(){
  navigator.clipboard.writeText(document.getElementById('modal-msg').textContent);
  var btn=document.querySelector('.modal-btn.primary');
  btn.textContent='Copied!';
  setTimeout(function(){btn.textContent='Copy Message';},1500);
}
function showTip(e,text){
  var tip=document.getElementById('tooltip');
  tip.textContent=text.replace(/\\n/g,'\n');
  tip.style.whiteSpace='pre';
  tip.style.left=(e.clientX+12)+'px';
  tip.style.top=(e.clientY-10)+'px';
  tip.style.opacity='1';
}
function hideTip(){document.getElementById('tooltip').style.opacity='0';}

// ── NAV ──────────────────────────────────────────────────────────────
function selectStudent(idx){selectedStudent=DATA[idx];renderList();renderDetail(selectedStudent);}
function goOverview(){selectedStudent=null;renderList();renderOverview();}
function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.s-pill').forEach(function(p){p.classList.remove('active');});
  document.querySelector('.s-pill.'+f).classList.add('active');
  renderList();
}
function handleSearch(v){currentSearch=v.toLowerCase();renderList();}

// ── INIT ─────────────────────────────────────────────────────────────
document.getElementById('today-label').textContent='Today: '+TODAY.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
var counts=computeCounts();
document.getElementById('cnt-all').textContent=counts.total;
document.getElementById('cnt-notify').textContent=counts.notify;
document.getElementById('cnt-watch').textContent=counts.watch;
document.getElementById('cnt-ok').textContent=counts.ok;
renderList();
renderOverview();
</script>
